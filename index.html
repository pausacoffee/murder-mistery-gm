<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멀티 게임 GM 플랫폼</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="orientation-guard hidden" id="orientationGuard" role="alert" aria-live="polite">
    <h2>가로 모드로 회전해 주세요</h2>
    <p>모바일에서는 가로 화면을 지원합니다. TV/노트북에서 가장 좋은 경험을 제공합니다.</p>
  </div>

  <div class="platform-shell">
    <aside class="side-ad side-ad-left hidden">
      <div class="ad-slot" data-slot="left-rail">광고 영역</div>
    </aside>
    <aside class="side-ad side-ad-right hidden">
      <div class="ad-slot" data-slot="right-rail">광고 영역</div>
    </aside>

    <header class="platform-header">
      <h1 class="platform-title" id="platformTitle">멀티 게임 GM</h1>
      <p class="platform-subtitle" id="platformSubtitle">TV/노트북 16:9 환경 권장</p>
    </header>

    <section class="view-card" id="catalogView">
      <div class="toolbar-row">
        <input id="gameSearchInput" class="search-input" type="search" placeholder="게임 이름 검색" aria-label="게임 이름 검색" />
        <select id="gameSortSelect" class="sort-select" aria-label="정렬">
          <option value="name">이름순</option>
          <option value="players">인원순</option>
        </select>
      </div>
      <div id="gameList" class="game-grid" aria-live="polite"></div>
    </section>

    <section class="view-card hidden" id="detailView">
      <div class="detail-header-row">
        <button id="detailBackBtn" type="button">목록으로</button>
      </div>
      <div class="detail-layout">
        <div class="detail-image-wrap">
          <img id="detailBoxImage" class="detail-image hidden" alt="게임 박스 이미지" />
          <div id="detailImageFallback" class="detail-image-fallback">박스 이미지 준비중</div>
        </div>
        <div class="detail-content">
          <h2 id="detailTitle"></h2>
          <p id="detailPrequel" class="detail-prequel"></p>
          <p id="detailPlayers" class="detail-players"></p>
          <button id="enterGameBtn" type="button">입장</button>
        </div>
      </div>
      <p id="detailCopyright" class="copyright-text"></p>
    </section>

    <section class="hidden" id="gmView">
      <div class="app-shell">
        <div class="slide-frame">
          <header class="top-bar">
            <div class="header-title" id="headerTitle">게임 흐름 요약</div>
            <button class="header-info-btn hidden" id="headerPartInfoBtn" type="button" data-role="part-info-open" aria-label="현재 순서 규칙 안내">i</button>
            <div class="header-controls">
              <button class="header-part-end-btn hidden" id="headerPartEndBtn" type="button" data-role="part-end-open">이야기 카드 A 공개</button>
              <button class="header-part-end-btn hidden" id="headerPart2EndBtn" type="button" data-role="part2-end-open">이야기 카드 B 공개</button>
              <button class="rules-book-btn" id="headerRulesBookBtn" type="button" data-role="rules-book-open" style="display:none;" aria-label="규칙 열기">
                <svg class="rules-book-icon" viewBox="0 0 64 48" aria-hidden="true" focusable="false">
                  <path d="M3.5 34.5L10.5 11.5c7 2 14 0 21.5 5.8 7.5-5.8 14.5-3.8 21.5-5.8l7 23c-10.5-2-19.6-.7-28.5 6-8.9-6.7-18-8-28.5-6Z" />
                  <path d="M32 17v23" />
                  <path d="M8 30c9-2 17-.7 24 6" />
                  <path d="M56 30c-9-2-17-.7-24 6" />
                </svg>
                <span class="sr-only">규칙</span>
              </button>
              <div id="bgmPanel" class="bgm-panel hidden" aria-label="배경음 제어">
                <button id="bgmMuteBtn" type="button" class="bgm-btn">음소거</button>
                <input id="bgmVolumeRange" type="range" min="0" max="1" step="0.05" value="0.5" aria-label="음량" />
              </div>
              <div class="page-indicator">
                <span id="pageNow">1</span> / <span id="pageTotal">1</span>
              </div>
              <div class="nav-buttons">
                <button id="prevBtn" type="button" aria-label="이전">&lt;</button>
                <button id="nextBtn" type="button" aria-label="다음">&gt;</button>
              </div>
            </div>
          </header>

          <main class="slides-container" id="slidesContainer"></main>
        </div>
      </div>
      <p id="gmCopyright" class="copyright-text"></p>
    </section>
  </div>

  <div class="confirm-modal hidden" id="confirmModal" aria-hidden="true">
    <div class="confirm-modal-backdrop" data-role="confirm-cancel"></div>
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
      <div class="confirm-modal-body">
        <div class="confirm-message" id="confirmModalMessage">확인 메시지</div>
      </div>
      <div class="confirm-modal-actions">
        <button class="confirm-ok-btn" type="button" data-role="confirm-ok">확인</button>
        <button class="confirm-cancel-btn" type="button" data-role="confirm-cancel">취소</button>
      </div>
    </div>
  </div>

  <div class="npc-modal hidden" id="npcModal" aria-hidden="true">
    <div class="npc-modal-backdrop" data-role="npc-modal-close"></div>
    <div class="npc-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="npcModalTitle">
      <div class="npc-modal-header">
        <h2 class="npc-modal-title" id="npcModalTitle">5인 플레이 NPC 안내</h2>
        <button class="npc-close-btn" type="button" data-role="npc-modal-close" aria-label="팝업 닫기">닫기</button>
      </div>
      <div class="npc-modal-body">
        <div class="npc-illustration-placeholder">NPC 캐릭터 일러스트 영역</div>
      </div>
    </div>
  </div>

  <div class="rules-modal hidden" id="rulesModal" aria-hidden="true">
    <div class="rules-modal-backdrop" data-role="rules-modal-close"></div>
    <div class="rules-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="rulesModalTitle">
      <div class="rules-modal-header">
        <h2 class="rules-modal-title" id="rulesModalTitle">규칙</h2>
        <button class="rules-close-btn" type="button" data-role="rules-modal-close" aria-label="팝업 닫기">닫기</button>
      </div>
      <div class="rules-modal-tabs" id="rulesModalTabs" role="tablist" aria-label="규칙 탭"></div>
      <div class="rules-modal-body" id="rulesModalBody" aria-live="polite">
        <p>규칙 내용을 불러오는 중입니다.</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
